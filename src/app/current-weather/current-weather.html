<div>
    <input class="input" type="text" #cityInput placeholder="enter city/state/country" >
    <button class="input" (click)="searchCity(cityInput.value)">Search</button>
</div>

<h1>{{ temperature }} °F</h1>
<h2>{{ city }}</h2>
<div class="center">
    <h3>{{ description }}</h3>
    <h3>wind: {{ wind }} mph</h3>
</div>
<div class="center">
    <h3>↓ {{ tempLow }}° / ↑ {{ tempHigh }}°</h3>
    <h3>feels like: {{ feelsLike }}°F</h3>
</div>
